<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPURPOSE // KERNEL v1.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="elite-theme">
    <div class="noise-overlay"></div>
    <div class="glow-container">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <main class="viewport">
        <nav class="top-nav">
            <div class="brand">SYSTEM:<span>REPURPOSE</span></div>
            <div class="system-metrics">
                <div class="metric">LATENCY: <span id="ms">12ms</span></div>
                <div class="metric">MODEL: <span id="ver">GEMINI-3-ULTRA</span></div>
            </div>
        </nav>

        <div class="elite-grid">
            <!-- THE KERNEL (INPUT) -->
            <div class="bento-card kernel" id="kernel-input">
                <div class="card-glow"></div>
                <div class="card-content">
                    <div class="tag">INPUT_STREAM</div>
                    <textarea id="main-input" placeholder=">> INITIALIZE CONTENT STREAM..."></textarea>
                    <div class="ctrl-row">
                        <button class="execute-btn" onclick="runEliteEngine()">
                            <span>EXECUTE_TRANSFORM</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- ASSET: X-THREAD -->
            <div class="bento-card x-asset" data-stagger="1">
                <div class="card-content">
                    <div class="tag">ASSET_01 // X_THREAD</div>
                    <div class="output-viewer" id="x-view"></div>
                </div>
            </div>

            <!-- ASSET: LINKEDIN -->
            <div class="bento-card li-asset" data-stagger="2">
                <div class="card-content">
                    <div class="tag">ASSET_02 // PROFESSIONAL</div>
                    <div class="output-viewer" id="li-view"></div>
                </div>
            </div>

            <!-- ASSET: IMAGE PARAMS -->
            <div class="bento-card img-asset" data-stagger="3">
                <div class="card-content">
                    <div class="tag">ASSET_03 // VISUAL_PROMPTS</div>
                    <div class="output-viewer" id="img-view"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
